

<div
  class="enterprise-card"
  [class.isActive]="isActive"
  (mouseenter)="handleHover()"
  >
    <!-- <img src="/src/app/ai.png" width="100%" height="200px"> -->


  <!-- <h6>{{ title }}</h6> -->
  
  <h6 class="mt-3 fw-semibold title">
    {{ title }}
  </h6>
    <div class="image-wrap">

    <img
      [src]="image"
      class="card-image"
      style="height: 200px; object-fit: contain;"
    >
</div>

  <ul class="feature-list" *ngIf="isActive">
    <li class="li-class"  *ngFor="let item of points">{{ item }}</li>
  </ul>

  <button
    *ngIf="isMobile"
    class="btn btn-link p-0 mt-2 and-more"
    (click)="handleClick()"
  >
    and more →
  </button>
</div>
